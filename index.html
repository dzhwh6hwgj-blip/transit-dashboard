<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Family Transit & Calendar Dashboard</title>
  <style>
    :root {
      --bg-color: #0b0f19;
      --card-bg: #161b26;
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #3b82f6;
      --border: #242b3d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      padding: 24px;
      height: 100vh;
      display: grid;
      grid-template-columns: 1fr 1.5fr;
      gap: 24px;
      overflow: hidden;
    }

    .panel {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    h2 {
      font-size: 1.5rem;
      margin-bottom: 20px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .weather-widget {
      font-size: 1.1rem;
      font-weight: normal;
      background: rgba(255, 255, 255, 0.05);
      padding: 4px 12px;
      border-radius: 20px;
    }

    .scrollable-content {
      flex: 1;
      overflow-y: auto;
      padding-right: 4px;
    }

    /* Transit Styles */
    .transit-item {
      padding: 16px;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .route-badge {
      background-color: var(--accent);
      color: white;
      padding: 6px 12px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1.1rem;
    }

    .countdown {
      font-size: 1.6rem;
      font-weight: bold;
      color: #10b981;
    }

    .countdown.imminent {
      color: #ef4444;
      animation: pulse 1.5s infinite;
    }

    /* Calendar Styles */
    .calendar-section {
      margin-bottom: 24px;
    }

    .section-title {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .event-card {
      padding: 12px 16px;
      background: rgba(255, 255, 255, 0.02);
      margin-bottom: 8px;
      border-radius: 8px;
      border-left: 5px solid var(--accent);
      font-size: 1.1rem;
    }

    .upcoming-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .day-column {
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
    }

    .day-header {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .mini-event {
      font-size: 0.85rem;
      padding: 4px 8px;
      margin-bottom: 4px;
      border-radius: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      border-left: 3px solid #fff;
    }

    /* Utilities */
    .loading-text {
      color: var(--text-muted);
      text-align: center;
      padding: 4px;
      font-style: italic;
    }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="panel">
    <h2>
      Departures
      <span id="weather-display" class="weather-widget">Loading Weather...</span>
    </h2>
    <div id="transit-container" class="scrollable-content">
      <div class="loading-text">Awaiting synchronization data...</div>
    </div>
  </div>

  <div class="panel">
    <h2>Family Schedule</h2>
    <div class="scrollable-content">
      
      <div class="calendar-section">
        <div class="section-title">Today</div>
        <div id="today-events">
          <div class="loading-text">Awaiting calendar sync...</div>
        </div>
      </div>

      <div class="calendar-section">
        <div class="section-title">Looking Ahead</div>
        <div id="upcoming-events-grid" class="upcoming-grid">
        </div>
      </div>

    </div>
  </div>

  <script>
    // HARDCODED CONFIGURATION FOR STANDALONE URL RUNNING (KITCAST)
    // Make sure your real credentials stay within these quotes
    const MY_API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJqdGkiOiJ0OUhrVHFFenVlNzgxZVRYejdST21Gak9zVC1tcjNtOXRrZWhQamhYRGxVIiwiaWF0IjoxNzc2OTEzNDc1fQ.RaeiQ2b0hql4xroCJS8WO7H9osZKxCYQDulnVZm2UFc";
    const MY_TRANSIT_URL = "https://api.transport.nsw.gov.au/v1/tp/departure_mon?outputFormat=rapidJSON&type_dm=stop&name_dm=10115902&mode=direct&TfNSWDM=true&realtime=true";

    // 1. FETCH TRANSIT DATA DIRECTLY FROM THE BROWSER (WITH CORS BYPASS)
    async function fetchTransit() {
      try {
        const proxyUrl = "https://cors-anywhere.herokuapp.com/";
        
        let res = await fetch(proxyUrl + MY_TRANSIT_URL, {
          headers: {
            "Authorization": "Bearer " + MY_API_KEY,
            "Accept": "application/json",
            "X-Requested-With": "XMLHttpRequest"
          }
        });
        let data = await res.json();
        renderTransit(data);
      } catch (e) {
        console.error("Primary transit engine blocked, engaging secondary structural tunnel...", e);
        
        // Secondary backup bypass layer in case proxy 1 experiences throttling
        try {
          const backupProxy = "https://api.allorigins.win/get?url=";
          let res = await fetch(backupProxy + encodeURIComponent(MY_TRANSIT_URL));
          let wrapper = await res.json();
          let data = JSON.parse(wrapper.contents);
          renderTransit(data);
        } catch (err) {
          console.error("All structural proxy layers exhausted:", err);
          document.getElementById('transit-container').innerHTML = 
            '<div class="loading-text" style="color:#ef4444;">Network Connection Gateway Timeout</div>';
        }
      }
    }

    function renderTransit(rawTransit) {
      const transitContainer = document.getElementById('transit-container');
      if (rawTransit && rawTransit.stopEvents) {
        let html = '';
        const departures = rawTransit.stopEvents.slice(0, 6);
        
        if (departures.length === 0) {
          html = '<div class="loading-text">No upcoming scheduled services found.</div>';
        } else {
          departures.forEach(ev => {
            const line = ev.transportation.disassembledName || ev.transportation.name;
            const dest = ev.transportation.destination.name;
            const depTime = new Date(ev.departureTimeEstimated || ev.departureTimePlanned);
            const diffMs = depTime - new Date();
            const diffMin = Math.max(0, Math.round(diffMs / 60000));
            const isImminent = diffMin <= 4;
            const countdownClass = isImminent ? 'countdown imminent' : 'countdown';
            const displayTime = diffMin === 0 ? 'Now' : `${diffMin}m`;

            html += `
              <div class="transit-item">
                <div>
                  <span class="route-badge">${line}</span>
                  <span style="margin-left: 12px; font-weight: 500;">to ${dest}</span>
                </div>
                <div class="${countdownClass}">${displayTime}</div>
              </div>
            `;
          });
        }
        transitContainer.innerHTML = html;
      }
    }

    // 2. FETCH WEATHER DATA DIRECTLY FROM THE BROWSER
    async function fetchWeather() {
      try {
        const url = "https://api.open-meteo.com/v1/forecast?latitude=-33.6500&longitude=151.2833&current_weather=true&hourly=precipitation_probability&timezone=Australia%2FSydney&forecast_days=1";
        let res = await fetch(url);
        let data = await res.json();
        const cur = data.current_weather;
        
        let icon = "☀️";
        if (cur.weathercode === 1 || cur.weathercode === 2) icon = "🌤";
        if (cur.weathercode === 3) icon = "☁️";
        if (cur.weathercode >= 51 && cur.weathercode <= 67) icon = "🌧";
        if (cur.weathercode >= 80 && cur.weathercode <= 82) icon = "🌦";
        if (cur.weathercode >= 95) icon = "⛈";

        let txt = `${icon} ${Math.round(cur.temperature)}°C`;
        document.getElementById('weather-display').innerHTML = txt;
      } catch (e) {
        console.error("Weather error:", e);
      }
    }

    function setupPlaceholderCalendar() {
      document.getElementById('today-events').innerHTML = '<div class="loading-text">Connect Google/iCloud URL for Kitcast Calendar sync.</div>';
    }

    // STARTUP AND LOOPING HEARTBEAT (Runs every 30 seconds)
    function init() {
      fetchTransit();
      fetchWeather();
      setupPlaceholderCalendar();
      
      setInterval(() => {
        fetchTransit();
        fetchWeather();
      }, 30000);
    }

    window.onload = init;
  </script>
</body>
</html>
